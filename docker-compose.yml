version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: areasorted-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: areasorted
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - areasorted-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d areasorted"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  areasorted-postgres-data:
